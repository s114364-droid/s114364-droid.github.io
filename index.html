<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🤡 你的真實廢物 MBTI 是什麼？</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Microsoft JhengHei",sans-serif;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:750px;
    background:white;
    border-radius:25px;
    padding:30px;
    box-shadow:0 15px 40px rgba(0,0,0,.15);
}

.title{
    text-align:center;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:25px;
}

.progress{
    text-align:center;
    margin-bottom:20px;
    color:#888;
}

.question{
    font-size:26px;
    font-weight:bold;
    margin-bottom:20px;
}

.option{
    width:100%;
    padding:16px;
    border:none;
    margin:10px 0;
    border-radius:15px;
    background:#f5f5f5;
    cursor:pointer;
    transition:.25s;
    font-size:16px;
}

.option:hover{
    transform:translateY(-2px);
    background:#6c63ff;
    color:white;
}

.result{
    text-align:center;
    animation:fade .5s;
}

.emoji{
    font-size:100px;
}

.result-title{
    font-size:40px;
    margin-top:10px;
}

.match{
    margin:20px 0;
    background:linear-gradient(135deg,#6c63ff,#8b7dff);
    color:white;
    padding:20px;
    border-radius:20px;
}

.percent{
    font-size:48px;
    font-weight:bold;
}

.card{
    text-align:left;
    background:#f8f9ff;
    margin-top:15px;
    padding:18px;
    border-radius:15px;
}

.card h3{
    margin-bottom:8px;
}

.restart{
    margin-top:25px;
    padding:15px 30px;
    border:none;
    border-radius:15px;
    background:#6c63ff;
    color:white;
    font-size:18px;
    cursor:pointer;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>
<body>

<div class="container">

<h1 class="title">🤡 你的真實廢物 MBTI 是什麼？</h1>
<p class="subtitle">⚠️ 本測驗毫無科學根據，但可能過於真實</p>

<div id="app"></div>

</div>

<script>

const scores = {
BEDP:0,
PHON:0,
PZZA:0,
DRAM:0,
LAZY:0,
DEAD:0
};

const questions = [

{
q:"鬧鐘響了，你的第一反應是？",
a:[
["再睡5分鐘（其實1小時）","BEDP"],
["拿起手機看crush回訊息了沒","JOKE"],
["想直接不去上班/上學","DEAD"],
["開始想像今天是芥末日(?","DRAM"]
]
},

{
q:"放假時最常做什麼？",
a:[
["跟周公下棋","BEDP"],
["時不時看手機看crush有沒有回訊息","JOKE"],
["當饕餮","PZZA"],
["讓大腦暫時休眠","LAZY"]
]
},

{
q:"考試剩一天時？",
a:[
["相信奇蹟","DEAD"],
["安慰自己他在忙才沒回訊息","JOKE"],
["幻想一邊睡覺一邊讀","DRAM"],
["吃個東西壓壓驚","PZZA"]
]
},

{
q:"手機剩3%電量時？",
a:[
["怕沒電關機收不到crush訊息","JOKE"],
["隨緣","DEAD"],
["睡一下說不定就有電了","BEDP"],
["幫手機想遺言","DRAM"]
]
},

{
q:"朋友找你出門？",
a:[
["離我家方圓100公尺以外不去","LAZY"],
["床把我綁架了","BEDP"],
["要去吃飯嗎","PZZA"],
["傳訊息問crush要不要一起","JOKE"]
]
},

{
q:"半夜兩點還沒睡？",
a:[
["滑手機等crush回訊息","JOKE"],
["追劇","BEDP"],
["吃宵夜","PZZA"],
["回想尷尬往事","DRAM"]
]
},

{
q:"老師說要分組時？",
a:[
["希望有人幫做","LAZY"],
["傳訊息問crush要不要一起","JOKE"],
["幻想自己是主角","DRAM"],
["先約吃飯","PZZA"]
]
},

{
q:"你的人生座右銘？",
a:[
["明天再說","DEAD"],
["能躺就不坐","BEDP"],
["他能不能喜歡我","JOKE"],
["吃飽再煩惱","PZZA"]
]
}

];

const results = {

BEDP:{
emoji:"🛌",
title:"BEDP 床鋪共生體",
match:"96%",
text:"你已經和床建立永久同盟。",
strength:"假日可以消失在棉被裡兩天。",
weak:"起床像打最終Boss。"
},

PHON:{
emoji:"🤡",
title:"JOKE 暈船小狗",
match:"94%",
text:"眼睛一睜 騷擾crush。",
strength:"張口閉口都是他。",
weak:"他不回你訊息就發瘋。"
},

PZZA:{
emoji:"🍕",
title:"PZZA 披薩守護者",
match:"91%",
text:"你的情緒由食物供電。",
strength:"永遠知道哪裡有好吃的。",
weak:"肚子餓時戰力歸零。"
},

DRAM:{
emoji:"🎭",
title:"DRAM 八點檔主角",
match:"95%",
text:"你的腦內小劇場全年無休。",
strength:"想像力超強。",
weak:"容易自己嚇自己。"
},

LAZY:{
emoji😪",
title:"LAZY 節能模式",
match:"93%",
text:"你是懶惰界的藝術家。",
strength:"超會保存體力。",
weak:"移動需要很大決心。"
},

DEAD:{
emoji:"💀",
title:"DEAD 奇蹟信仰者",
match:"99%",
text:"你相信宇宙會幫你完成一切。",
strength:"心態穩如老狗。",
weak:"截止日前才開始。"
}

};

let current = 0;

function renderQuestion(){

const q = questions[current];

document.getElementById("app").innerHTML = `
<div class="progress">
第 ${current+1} / ${questions.length} 題
</div>

<div class="question">${q.q}</div>

<div id="options"></div>
`;

const box = document.getElementById("options");

q.a.forEach(item=>{

const btn = document.createElement("button");

btn.className="option";

btn.innerText=item[0];

btn.onclick=()=>{

scores[item[1]]++;

current++;

if(current<questions.length){
renderQuestion();
}else{
showResult();
}

};

box.appendChild(btn);

});

}

function showResult(){

let winner = Object.keys(scores)
.reduce((a,b)=>scores[a]>scores[b]?a:b);

const r = results[winner];

document.getElementById("app").innerHTML=`

<div class="result">

<div class="emoji">${r.emoji}</div>

<h2 class="result-title">${r.title}</h2>

<div class="match">
匹配度
<div class="percent">${r.match}</div>
</div>

<div class="card">
<h3>📖 人格解析</h3>
<p>${r.text}</p>
</div>

<div class="card">
<h3>✨ 特徵</h3>
<p>${r.strength}</p>
</div>

<div class="card">
<h3>⚠️ 注意事項</h3>
<p>${r.weak}</p>
</div>

<button class="restart" onclick="location.reload()">
再測一次
</button>

</div>
`;
}

renderQuestion();

</script>

</body>
</html>
